<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training — Petrus</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green:#5c1a1a; --green-dark:#2d0a0a; --gold:#b89650; --gold-light:#d4b87a; --cream:#faf7f1; --sans:'Inter',sans-serif; --serif:'Cormorant Garamond',serif; }
body { font-family:var(--sans); background:var(--green-dark); color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
.container { text-align:center; max-width:400px; width:100%; }
.logo { font-family:var(--serif); font-size:42px; color:var(--gold); letter-spacing:3px; margin-bottom:6px; }
.subtitle { font-size:13px; color:var(--gold-light); letter-spacing:2px; text-transform:uppercase; opacity:0.8; margin-bottom:40px; }
.divider { width:50px; height:1px; background:var(--gold); margin:0 auto 36px; opacity:0.4; }
.nav-buttons { display:flex; flex-direction:column; gap:14px; }
.nav-btn { display:block; width:100%; padding:18px 24px; background:transparent; border:1px solid rgba(184,150,80,0.3); border-radius:6px; color:var(--cream); font-family:var(--sans); font-size:15px; font-weight:400; letter-spacing:2px; text-transform:uppercase; text-decoration:none; text-align:center; transition:all 0.3s ease; cursor:pointer; }
.nav-btn:hover { background:rgba(184,150,80,0.1); border-color:var(--gold); color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 20px rgba(184,150,80,0.15); }
.back-link { margin-top:40px; }
.back-link a { color:var(--gold-light); text-decoration:none; font-size:12px; letter-spacing:1px; text-transform:uppercase; opacity:0.6; }
.back-link a:hover { opacity:1; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Training</div>
  <p class="subtitle">Petrus</p>
  <div class="divider"></div>
  <nav class="nav-buttons">
    <a href="https://petrustrainingportal.netlify.app/" target="_blank" class="nav-btn">Food</a>
    <a href="winelist.html" class="nav-btn">Wine</a>
  </nav>
  <div class="back-link"><a href="index.html">&larr; Back</a></div>
</div>

<!-- Firebase + Auth -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>
auth.onAuthStateChanged((user) => {
  if (!user) { window.location.href = 'index.html'; }
  else { logAccess(user, 'page_view', 'training.html'); }
});
</script>
</body>
</html>
