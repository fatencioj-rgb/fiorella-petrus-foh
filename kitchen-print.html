<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrus — Bookings Kitchen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-dark: #2d0a0a;
            --red: #5c1a1a;
            --gold: #b89650;
            --cream: #faf7f1;
            --border: #e0d6c8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--red-dark);
            padding: 40px 20px;
        }

        /* === HEADER === */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--red-dark);
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        .page-header .label-bookings {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0;
        }
        .page-header .label-section {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--red);
        }

        /* === UPLOAD === */
        .upload-area {
            max-width: 320px;
            margin: 0 auto 28px;
            text-align: center;
        }
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-box:hover {
            border-color: var(--gold);
            background: #fdf9f2;
        }
        .upload-box p {
            font-size: 0.85rem;
            color: var(--red-dark);
            font-weight: 500;
        }
        .upload-box input[type="file"] { display: none; }
        .upload-status {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 500;
        }

        /* === FORM === */
        .form-area {
            max-width: 1050px;
            margin: 0 auto 30px;
            display: none;
        }
        .form-area.visible { display: block; }

        .header-fields {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .field-group label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--red);
        }
        .field-group input,
        .field-group select {
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            background: var(--cream);
        }

        /* === TABLE === */
        .reservations-container {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .res-table-edit {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .res-table-edit th {
            background: var(--red-dark);
            color: white;
            padding: 7px 5px;
            text-align: left;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .res-table-edit td {
            padding: 3px 3px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .res-table-edit input,
        .res-table-edit select {
            width: 100%;
            padding: 5px 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 0.78rem;
            font-family: 'Inter', sans-serif;
            background: var(--cream);
        }
        .res-table-edit input.narrow { width: 50px; }
        .res-table-edit input.med { width: 90px; }

        /* Drag handle */
        .drag-handle {
            cursor: grab;
            color: #bbb;
            font-size: 1rem;
            padding: 0 4px;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }
        tr.dragging {
            opacity: 0.4;
            background: #f0e8d8;
        }
        tr.drag-over td {
            border-top: 2px solid var(--gold);
        }

        .btn-remove-row {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1rem;
            cursor: pointer;
            padding: 2px 5px;
        }
        .btn-remove-row:hover { color: var(--red); }

        /* === ACTIONS === */
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            border: none;
            padding: 9px 18px;
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s;
        }
        .btn-add { background: var(--gold); color: white; }
        .btn-add:hover { background: #a07d3a; }
        .btn-print { background: var(--red-dark); color: var(--cream); font-weight: 600; }
        .btn-print:hover { background: #1a0505; }
        .btn-clear { background: #e8e3dc; color: #666; }
        .btn-clear:hover { background: #ddd6cc; }

        /* === PRINT === */
        .print-area { display: none; }
        .print-page {
            width: 148mm;
            min-height: 200mm;
            background: white;
            padding: 8mm;
            font-size: 8pt;
            line-height: 1.3;
            page-break-after: always;
        }
        .print-page h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13pt;
            text-align: center;
            margin-bottom: 1px;
            color: var(--red-dark);
        }
        .print-page .p-service {
            text-align: center;
            font-size: 10pt;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--red);
        }
        .print-header-info {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--red-dark);
            padding-bottom: 4px;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 8pt;
        }
        .print-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 7.5pt;
        }
        .print-table th {
            background: var(--red-dark);
            color: white;
            padding: 3px 4px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 6.5pt;
        }
        .print-table td {
            padding: 3px 4px;
            border-bottom: 0.5px solid var(--border);
            vertical-align: top;
        }
        .print-table tr:nth-child(even) { background: #f9f6f0; }
        .print-table .allergy-cell { color: var(--red); font-weight: 600; }

        .menu-summary {
            margin-top: 8px;
            padding: 5px 10px;
            border: 1.5px solid var(--gold);
            border-radius: 4px;
            font-size: 7.5pt;
            font-weight: 600;
        }
        .menu-summary span { margin-right: 14px; }

        .allergy-summary {
            margin-top: 6px;
            padding: 5px 10px;
            border: 2px solid var(--red);
            border-radius: 4px;
            font-size: 7.5pt;
        }
        .allergy-summary-title {
            font-weight: 700;
            color: var(--red);
            margin-bottom: 3px;
            font-size: 8pt;
        }
        .allergy-summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 7pt;
        }
        .allergy-summary-table td {
            padding: 2px 5px;
            border-bottom: 0.5px solid var(--border);
        }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .page-header, .upload-area, .form-area { display: none !important; }
            .print-area { display: block !important; }
            .print-page { margin: 0; padding: 6mm; }
            @page { size: A5 portrait; margin: 0; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1>Petrus</h1>
    <div class="label-bookings">BOOKINGS</div>
    <div class="label-section">KITCHEN</div>
</div>

<div class="upload-area">
    <div class="upload-box" onclick="document.getElementById('csvFile').click()">
        <p>Upload</p>
        <input type="file" id="csvFile" accept=".csv" onchange="handleCSV(event)">
    </div>
    <div class="upload-status" id="uploadStatus"></div>
</div>

<div class="form-area" id="formArea">
    <div class="header-fields">
        <div class="field-group">
            <label>Service</label>
            <select id="service">
                <option value="LUNCH">LUNCH</option>
                <option value="DINNER">DINNER</option>
            </select>
        </div>
        <div class="field-group">
            <label>Date</label>
            <input type="date" id="serviceDate">
        </div>
        <div class="field-group">
            <label>Covers</label>
            <input type="number" id="covers" min="0" placeholder="—">
        </div>
        <div class="field-group">
            <label>Tables</label>
            <input type="number" id="tables" min="0" placeholder="—">
        </div>
    </div>

    <div class="reservations-container">
        <table class="res-table-edit">
            <thead>
                <tr>
                    <th></th>
                    <th>Time</th>
                    <th>Pax</th>
                    <th>Name</th>
                    <th>Table</th>
                    <th>Menu</th>
                    <th>Special Occasion</th>
                    <th>Allergy / Req</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn btn-add" onclick="addEmptyRow()">+ Add</button>
        <button class="btn btn-print" onclick="generateAndPrint()">Print</button>
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="print-area" id="printArea">
    <div class="print-page" id="printPage1"></div>
    <div class="print-page" id="printPage2"></div>
</div>

<script>
document.getElementById('serviceDate').valueAsDate = new Date();

// === CSV ===
function handleCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const dateMatch = file.name.match(/(\d{2})-(\d{2})-(\d{4})/);
    if (dateMatch) {
        const [, month, day, year] = dateMatch;
        document.getElementById('serviceDate').value = year + '-' + month + '-' + day;
    }
    if (/dinner/i.test(file.name)) document.getElementById('service').value = 'DINNER';
    else if (/lunch/i.test(file.name)) document.getElementById('service').value = 'LUNCH';

    const reader = new FileReader();
    reader.onload = function(e) {
        const rows = parseCSV(e.target.result);
        populateFromCSV(rows);
        document.getElementById('uploadStatus').textContent = rows.length + ' reservations loaded';
    };
    reader.readAsText(file);
}

function parseCSV(text) {
    const lines = text.split('\n');
    const headers = parseCSVLine(lines[0]);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const values = parseCSVLine(line);
        const row = {};
        headers.forEach((h, idx) => {
            row[h.trim().replace(/"/g, '')] = (values[idx] || '').replace(/"/g, '').trim();
        });
        rows.push(row);
    }
    return rows;
}

function parseCSVLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') inQuotes = !inQuotes;
        else if (c === ',' && !inQuotes) { result.push(current); current = ''; }
        else current += c;
    }
    result.push(current);
    return result;
}

// === EXTRACTORS ===
function extractMenu(notes) {
    if (!notes) return '';
    const found = [];
    const pat = /Menu\s+([\w\s\u00C0-\u024F]+?)\s+at\s+P/gi;
    let m;
    while ((m = pat.exec(notes)) !== null) {
        const n = m[1].trim().toLowerCase();
        if (n.includes('prestige')) found.push('Prestige');
        else if (n.includes('discovery')) found.push('Discovery');
        else if (n.includes('la carte')) found.push('ALC');
        else if (n.includes('lunch')) found.push('Lunch Menu');
    }
    if (found.length === 0) {
        if (/\bPST\b/.test(notes) || /\bprestige\b/i.test(notes)) found.push('Prestige');
        if (/\bdiscovery\b/i.test(notes)) found.push('Discovery');
        if (/\bALC\b/.test(notes) || /[aà] la carte/i.test(notes)) found.push('ALC');
        if (/\blunch menu\b/i.test(notes)) found.push('Lunch Menu');
    }
    return [...new Set(found)].join(', ');
}

function extractAllergies(notes) {
    if (!notes) return '';
    const hasNoDiet = /no diet/i.test(notes);
    const patterns = [
        { r: /shellfish/i, l: 'Shellfish' },
        { r: /peanut/i, l: 'Peanut' },
        { r: /\bnut\b|nut allergy|nuts\b/i, l: 'Nut' },
        { r: /gluten/i, l: 'Gluten Free' },
        { r: /dairy/i, l: 'Dairy Free' },
        { r: /\bvegan\b/i, l: 'Vegan' },
        { r: /\bvegetarian\b/i, l: 'Vegetarian' },
        { r: /\bpescatarian\b/i, l: 'Pescatarian' },
        { r: /\bhalal\b/i, l: 'Halal' },
        { r: /\bkosher\b/i, l: 'Kosher' },
        { r: /celiac|coeliac/i, l: 'Celiac' },
        { r: /lactose/i, l: 'Lactose' },
        { r: /\begg\b/i, l: 'Egg' },
        { r: /\bsoy\b/i, l: 'Soy' },
        { r: /no pork/i, l: 'No Pork' }
    ];
    const found = [];
    patterns.forEach(({ r, l }) => { if (r.test(notes)) found.push(l); });
    if (/FOOD & DRINK PREFERENCES:.*Allergy/i.test(notes) && found.length === 0) {
        found.push('Allergy (check notes)');
    }
    if (hasNoDiet && found.length === 0) return '';
    return [...new Set(found)].join(', ');
}

function extractOccasion(notes) {
    if (!notes) return '';
    const occ = [];
    const sp = notes.match(/SPECIAL EVENTS:\s*(.*?)$/im);
    if (sp && sp[1].trim()) occ.push(sp[1].trim());
    if (occ.length === 0) {
        const vm = notes.match(/VISIT NOTES:\s*(.*?)(?=SPECIAL EVENTS|GENERAL NOTES|FOOD & DRINK|GUEST REQUESTS|\d{5,}|$)/i);
        if (vm) {
            const b = vm[1].match(/(\w+'s\s+birthday)/i);
            if (b) occ.push(b[1]);
            const a = vm[1].match(/([\w-]+\s*anniversary)/i);
            if (a) occ.push(a[1]);
        }
    }
    return occ.join(', ');
}

// === POPULATE ===
function populateFromCSV(rows) {
    const tbody = document.getElementById('resBody');
    tbody.innerHTML = '';
    let covers = 0;
    const tblSet = new Set();

    rows.forEach(row => {
        const time = row['TIME'] || '';
        const pax = parseInt(row['PARTY SIZE'] || row['PAX'] || '0');
        const name = row['GUEST'] || row['NAME'] || '';
        const table = row['TABLE'] || '';
        const notes = row['NOTES AND TAGS'] || '';
        covers += pax;
        if (table) tblSet.add(table);
        addRow(time, pax, name, table, extractMenu(notes), extractOccasion(notes), extractAllergies(notes));
    });

    document.getElementById('covers').value = covers;
    document.getElementById('tables').value = tblSet.size;
    document.getElementById('formArea').classList.add('visible');
}

// === ROW MANAGEMENT ===
function addRow(time, pax, name, table, menu, occasion, allergy) {
    const tbody = document.getElementById('resBody');
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.innerHTML =
        '<td><span class="drag-handle">&#9776;</span></td>' +
        '<td><input type="text" value="' + esc(time) + '" class="r-time med"></td>' +
        '<td><input type="number" value="' + (pax || '') + '" class="r-pax narrow" min="1"></td>' +
        '<td><input type="text" value="' + esc(name) + '" class="r-name"></td>' +
        '<td><input type="text" value="' + esc(table) + '" class="r-table narrow"></td>' +
        '<td><select class="r-menu">' +
            '<option value=""' + (!menu ? ' selected' : '') + '>—</option>' +
            '<option value="Prestige"' + (menu.includes('Prestige') ? ' selected' : '') + '>Prestige</option>' +
            '<option value="Discovery"' + (menu.includes('Discovery') ? ' selected' : '') + '>Discovery</option>' +
            '<option value="ALC"' + (menu.includes('ALC') ? ' selected' : '') + '>ALC</option>' +
            '<option value="Lunch Menu"' + (menu.includes('Lunch Menu') ? ' selected' : '') + '>Lunch Menu</option>' +
        '</select></td>' +
        '<td><input type="text" value="' + esc(occasion) + '" class="r-occasion"></td>' +
        '<td><input type="text" value="' + esc(allergy) + '" class="r-allergy"></td>' +
        '<td><button class="btn-remove-row" onclick="this.closest(\'tr\').remove();recalc();">&#215;</button></td>';
    tbody.appendChild(tr);
    enableDrag(tr);
}

function addEmptyRow() { addRow('', '', '', '', '', '', ''); }

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function recalc() {
    let c = 0; const t = new Set();
    document.querySelectorAll('#resBody tr').forEach(tr => {
        c += parseInt(tr.querySelector('.r-pax').value) || 0;
        const tb = tr.querySelector('.r-table').value.trim();
        if (tb) t.add(tb);
    });
    document.getElementById('covers').value = c;
    document.getElementById('tables').value = t.size;
}

function clearAll() {
    if (!confirm('Clear all?')) return;
    document.getElementById('resBody').innerHTML = '';
    document.getElementById('covers').value = '';
    document.getElementById('tables').value = '';
    document.getElementById('uploadStatus').textContent = '';
}

// === DRAG TO REORDER ===
let dragRow = null;

function enableDrag(tr) {
    tr.addEventListener('dragstart', function(e) {
        dragRow = tr;
        tr.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    });
    tr.addEventListener('dragend', function() {
        tr.classList.remove('dragging');
        document.querySelectorAll('#resBody tr').forEach(r => r.classList.remove('drag-over'));
        dragRow = null;
    });
    tr.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (dragRow && dragRow !== tr) {
            tr.classList.add('drag-over');
        }
    });
    tr.addEventListener('dragleave', function() {
        tr.classList.remove('drag-over');
    });
    tr.addEventListener('drop', function(e) {
        e.preventDefault();
        tr.classList.remove('drag-over');
        if (dragRow && dragRow !== tr) {
            const tbody = document.getElementById('resBody');
            const rows = [...tbody.querySelectorAll('tr')];
            const fromIdx = rows.indexOf(dragRow);
            const toIdx = rows.indexOf(tr);
            if (fromIdx < toIdx) {
                tbody.insertBefore(dragRow, tr.nextSibling);
            } else {
                tbody.insertBefore(dragRow, tr);
            }
        }
    });
}

// === PRINT ===
function generateAndPrint() {
    const service = document.getElementById('service').value;
    const date = document.getElementById('serviceDate').value;
    const covers = document.getElementById('covers').value || '0';
    const tables = document.getElementById('tables').value || '0';
    const dateObj = new Date(date + 'T00:00:00');
    const dateStr = dateObj.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });

    const rows = document.querySelectorAll('#resBody tr');
    let html = '';
    const menuCount = { Prestige:0, Discovery:0, ALC:0, 'Lunch Menu':0 };
    const allergyList = [];

    rows.forEach(tr => {
        const time = tr.querySelector('.r-time').value;
        const pax = tr.querySelector('.r-pax').value;
        const name = tr.querySelector('.r-name').value;
        const table = tr.querySelector('.r-table').value;
        const menu = tr.querySelector('.r-menu').value;
        const occasion = tr.querySelector('.r-occasion').value;
        const allergy = tr.querySelector('.r-allergy').value;

        if (menu && menuCount[menu] !== undefined) menuCount[menu] += parseInt(pax) || 1;
        if (allergy.trim()) allergyList.push({ name: name||'Guest', table, pax, allergies: allergy });

        html += '<tr><td>' + esc(time) + '</td><td>' + esc(pax) + '</td><td><strong>' + esc(name) + '</strong></td><td>' + esc(table) + '</td><td>' + esc(menu) + '</td><td>' + esc(occasion) + '</td><td class="' + (allergy?'allergy-cell':'') + '">' + esc(allergy) + '</td></tr>';
    });

    // Menu summary
    const mp = [];
    Object.entries(menuCount).forEach(([n,c]) => { if(c>0) mp.push('<span>'+n+': '+c+'</span>'); });
    const menuHTML = mp.length ? '<div class="menu-summary">' + mp.join('') + '</div>' : '';

    // Allergy summary
    let allergyHTML = '';
    if (allergyList.length) {
        const ar = allergyList.map(a => '<tr><td><strong>'+esc(a.name)+'</strong></td><td>Tbl '+esc(a.table)+'</td><td>'+esc(a.pax)+' pax</td><td class="allergy-cell">'+esc(a.allergies)+'</td></tr>').join('');
        allergyHTML = '<div class="allergy-summary"><div class="allergy-summary-title">ALLERGIES — '+allergyList.length+' table'+(allergyList.length>1?'s':'')+'</div><table class="allergy-summary-table">'+ar+'</table></div>';
    }

    const page = '<h2>PETRUS</h2><div class="p-service">KITCHEN — ' + service + '</div><div class="print-header-info"><span>'+dateStr+'</span><span>Covers: '+covers+'</span><span>Tables: '+tables+'</span></div><table class="print-table"><thead><tr><th>Time</th><th>Pax</th><th>Name</th><th>Tbl</th><th>Menu</th><th>Occasion</th><th>Allergy/Req</th></tr></thead><tbody>'+html+'</tbody></table>'+menuHTML+allergyHTML;

    document.getElementById('printPage1').innerHTML = page;
    document.getElementById('printPage2').innerHTML = page;
    document.getElementById('printArea').style.display = 'block';
    setTimeout(function(){ window.print(); }, 300);
}

// === UPLOAD DRAG & DROP ===
const uploadBox = document.querySelector('.upload-box');
uploadBox.addEventListener('dragover', function(e) { e.preventDefault(); uploadBox.style.borderColor='var(--gold)'; });
uploadBox.addEventListener('dragleave', function() { uploadBox.style.borderColor='var(--border)'; });
uploadBox.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadBox.style.borderColor = 'var(--border)';
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.csv')) {
        document.getElementById('csvFile').files = e.dataTransfer.files;
        handleCSV({ target: { files: [file] } });
    }
});
</script>
</body>
</html>
